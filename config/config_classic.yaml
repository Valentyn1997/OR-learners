# Dataset for training / evaluation -- specific values should be filled for each dataset
dataset:
  name: ???
  collection: False                 # True for acic_2016 and acic_2018
  train_test_splitted: False
  oracle_available: False
  test_size: 0.15                    # train/test split ratio
  n_shuffle_splits: 1
  dataset_ix:                       # dataset index
  dim_cov: ???
  extra_hid_multiplier:


prop_model_cov:
  _target_: src.classic_models.XGBoostProp

  # Tunable hparams (some with default values)
  n_estimators: 100
  max_depth: 5
  reg_alpha: 50
  min_child_weight: 3
  gamma: 5

  tune_hparams: False
  tune_type: choice
  tune_range: 50
  hparams_grid:
    n_estimators:
      - 50
      - 100
      - 150
    max_depth:
      - 3
      - 6
      - 9
      - 12
    reg_alpha:
      - 40
      - 80
      - 120
      - 160
    min_child_weight:
      - 0
      - 3
      - 6
      - 9
    gamma:
      - 1
      - 3
      - 5
      - 7
      - 9


mu_model_cov:
  _target_: src.classic_models.XGBoostMu
  mu_model_type: s

  # Tunable hparams (some with default values)
  n_estimators: 100
  max_depth: 5
  reg_alpha: 50
  min_child_weight: 3
  gamma: 5

  tune_hparams: False
  tune_type: choice
  tune_range: 50
  hparams_grid:
    n_estimators:
      - 50
      - 100
      - 150
    max_depth:
      - 3
      - 6
      - 9
      - 12
    reg_alpha:
      - 40
      - 80
      - 120
      - 160
    min_child_weight:
      - 0
      - 3
      - 6
      - 9
    gamma:
      - 1
      - 3
      - 5
      - 7
      - 9


target_model:
  _target_: src.classic_models.XGBoostTarget
  q_trunc: 0.05
  tune_hparams: False
  n_estimators: 100


exp:
  seed: 10
  device: cuda
  logging: True
  plotting: False
  save_results: False
  mlflow_uri: http://127.0.0.1:5000  # MlFlow server is located on 138.246.237.244
  target_inp: repr   # repr | cov | out | cov_repr
  targets:
    - cate


# Hydra defaults
defaults:
  - _self_
  - override hydra/hydra_logging: colorlog
  - override hydra/job_logging: colorlog