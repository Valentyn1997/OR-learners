# @package _global_
repr_net:
  _target_: src.models.CFRISW
  name: cfrisw
  mu_net_type: tnet
  alpha: 0.0
  ipm: wass                       # wass | mmd
  has_prop_net_repr: True

  tune_hparams: False
  tune_range: 50                  # number of trials for random search
  tune_type: choice
  hparams_grid:
    lr:
      - 0.001
      - 0.005
      - 0.01
    batch_size:
      - 32
      - 64
      - 128
    wd:
      - 0.0
      - 0.001
      - 0.01
      - 0.1
    dim_hid1_multiplier:
      - 1.0
      - 1.5
      - 2.0
    dim_hid2_multiplier:
      - 1.0
      - 1.5
      - 2.0
    prop_net_repr_lr:
      - 0.001
      - 0.005
      - 0.01
    prop_net_repr_wd:
      - 0.0
      - 0.001
      - 0.01
      - 0.1
    prop_net_repr_dim_hid1_multiplier:
      - 1.0
      - 1.5
      - 2.0

prop_net_repr:
  _target_: src.models.PropNet

  # Tunable hparams (some with default values)
  dim_hid1_multiplier: 2.0
  lr:
  batch_size:
  wd:
  hid_layers: 1

  tune_hparams: False             # Done jointly with the repr_net
  num_epochs: 200